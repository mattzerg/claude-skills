<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>🚨 ZergGuard blocked this page</title>

      body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 60px auto; padding: 24px; }
      h1 { color: #b00; }
      .url { font-family: monospace; background: #fee; padding: 8px; border-radius: 4px; word-break: break-all; }
      .why { font-size: 14px; color: #333; }
      button { padding: 8px 16px; margin-right: 8px; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>🚨 ZergGuard blocked this page</h1>
    <p class="why">The destination matched a domain on the local known-bad list.</p>

    <p class="why" id="why"></p>
    <button onclick="history.back()">Go back (safe)</button>
    <button onclick="window.location = new URLSearchParams(window.location.search).get('url')">Proceed anyway (not recommended)</button>
    <script>
      const q = new URLSearchParams(location.search);
      document.getElementById("url").textContent = q.get("url") || "?";
      document.getElementById("why").textContent =
        "Matched IOC domain: " + (q.get("hit") || "?");
    </script>
  </body>
</html>
