# Zerg GTM Hub — internal viewer
# Deploy:    flyctl deploy
# Set auth:  flyctl secrets set GTM_HUB_USER=matt GTM_HUB_AUTH_HASH='<bcrypt>'

app = "zerg-gtm-hub"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
